# PFRDA Watcher — declarative source rulebook
# One combined feed; each item carries a `doc_type` tag (notification|circular|regulation)
# so the single channel can still be filtered downstream.
#
# Two modes per source:
#   - "teaser": the homepage What's New widget (5 items, fast, low-history)
#   - "archive": full listing pages (complete history, paginated via ?start=N)
#
# Pagination note: PFRDA uses Liferay's `start` param (1-based page index).
# Page 1 is fetched as the bare URL (no param); page 2+ appends ?start=2, etc.

defaults:
  base_url: "https://www.pfrda.org.in"
  request:
    timeout_seconds: 30
    user_agent: "Mozilla/5.0 (compatible; trilegal-pfrda-watcher/1.0)"
    retry: 3
    backoff_seconds: 4
  date_format: "%d-%m-%Y"        # DD-MM-YYYY as seen in .meta-item Issue Date

sources:

  # ---- TEASER (homepage What's New widget) ----------------------------------
  - id: whats_new_circulars
    doc_type: circular
    mode: teaser
    enabled: true
    list_url: "https://www.pfrda.org.in/"
    selectors:
      row: "div.list_object_view"
      link: "a"
      title: "div.whats-new-item-title p"
      date: "div.whats-new-item-date"

  # ---- ARCHIVE pages --------------------------------------------------------
  - id: circulars_archive
    doc_type: circular
    mode: archive
    enabled: true
    list_url: "https://www.pfrda.org.in/regulatory-framework/circulars"
    selectors:
      row: "div.basic-card"
      link: "a.basic-link"
      title: "h2.basic-title"
      date: "div.meta-item:last-child"   # "Issue Date: DD-MM-YYYY" — label stripped by scraper
    pagination:
      type: query_param
      param: start

  - id: notifications_archive
    doc_type: notification
    mode: archive
    enabled: true
    list_url: "https://www.pfrda.org.in/regulatory-framework/notifications"
    selectors:
      row: "div.basic-card"
      link: "a.basic-link"
      title: "h2.basic-title"
      date: "div.meta-item:last-child"
    pagination:
      type: query_param
      param: start

  - id: regulations_archive
    doc_type: regulation
    mode: archive
    enabled: true
    list_url: "https://www.pfrda.org.in/regulatory-framework/regulations"
    selectors:
      row: "div.basic-card"
      link: "a.basic-link"
      title: "h2.basic-title"
      date: "div.meta-item:last-child"
    pagination:
      type: query_param
      param: start
